<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cub's</title>
    <script>
      // Aplica o tema salvo ANTES do React montar, evitando flash de tema
      // errado. Espelha a chave/lógica de src/lib/theme.ts.
      try {
        var cubsTheme = localStorage.getItem('cubs.theme')
        if (cubsTheme !== 'light' && cubsTheme !== 'dark') {
          cubsTheme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        }
        document.documentElement.classList.toggle('dark', cubsTheme === 'dark')
      } catch (error) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
