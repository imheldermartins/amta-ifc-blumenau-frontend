# nginx do frontend Cub's (porta 80): serve o build do Vite e faz proxy da
# API e do socket.io para o backend — mesmo papel do proxy do Vite em dev
# (ver vite.config.ts). "backend" resolve pela rede do docker compose
# (cubs-backend/docker/docker-compose.prod.yml).

upstream cubs_backend {
    server backend:3000;
}

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # ── Cabeçalhos de segurança do SPA ───────────────────────────────────
    # Ficam AQUI e não no backend porque valem para o DOCUMENTO HTML: o
    # express só devolve JSON, e CSP em resposta de API não protege nada.
    #
    # `always` é obrigatório: sem ele o nginx omite o header em respostas de
    # erro (4xx/5xx), justamente as páginas onde um XSS refletido apareceria.

    # A CSP é a mitigação REAL do XSS — o HttpOnly do cookie só limita o
    # estrago depois que ele acontece. Notas de cada diretiva:
    #  - script-src 'self', SEM 'unsafe-inline' e SEM hash: não existe script
    #    inline no index.html. O anti-flash de tema mora em /theme-init.js
    #    justamente por isto — como arquivo, ele é 'self'; inline, exigiria um
    #    hash sha256 que muda a cada edição do script e quebraria a página em
    #    silêncio (só um erro no console) quando alguém esquecesse de
    #    regenerar. Arquivo externo não tem esse modo de falha.
    #  - style-src 'unsafe-inline': o Tailwind injeta estilo em runtime e o
    #    React escreve style="" nos elementos (largura de coluna, dnd-kit).
    #    Não há como evitar sem reescrever o layout da tabela.
    #  - connect-src: XHR da API na mesma origem + o WebSocket do socket.io,
    #    que precisa do esquema ws:/wss: declarado explicitamente.
    #  - frame-ancestors 'none': equivalente moderno do X-Frame-Options DENY.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # HSTS: obriga o navegador a só falar https com este host pelo próximo
    # ano. É o que fecha a brecha do PRIMEIRO acesso, quando o browser ainda
    # tentaria http e o cookie `Secure`/`__Host-` não viajaria.
    # ATENÇÃO: só faz sentido servindo por HTTPS. Num deploy http:// isto é
    # inofensivo (o navegador ignora HSTS em conexão insegura), mas o cookie
    # de sessão vai falhar por outro motivo — ver docker/backend.prod.env.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Impede o navegador de "adivinhar" o tipo do conteúdo (um .json servido
    # como texto não pode virar script executável).
    add_header X-Content-Type-Options "nosniff" always;

    # Não vazar a URL interna (que carrega ids de página) para terceiros.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA: qualquer rota desconhecida cai no index.html (TanStack Router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API: repassa o /api INTACTO (igual ao proxy do Vite em dev) — o prefixo é
    # real dos dois lados, o backend monta os routers sob /api.
    # ATENÇÃO: proxy_pass SEM barra no final é o que preserva o prefixo; com "/"
    # o nginx troca /api/pages -> /pages e o backend devolve 404.
    # O valor espelha API_BASE_PATH (src/constants/api.ts) na mão: arquivo de
    # config não importa TS. Mudou lá, mude aqui.
    location /api/ {
        proxy_pass http://cubs_backend;
        proxy_set_header Host $host;
        # X-Forwarded-For: obrigatório para o rate limit do backend enxergar
        # o IP real do client (junto com TRUST_PROXY=1 lá).
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger UI do backend (opcional; remova para não expor em prod).
    location /api-docs {
        proxy_pass http://cubs_backend;
        proxy_set_header Host $host;
    }

    # socket.io: proxy com upgrade de WebSocket — sem estes headers o
    # handshake ws falha e o socket.io degrada para polling (ou cai).
    location /socket.io/ {
        proxy_pass http://cubs_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # WebSocket fica aberto muito além dos 60s default.
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}
